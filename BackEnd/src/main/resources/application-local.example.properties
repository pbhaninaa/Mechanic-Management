# Copy to application-local.properties and add your keys.
# Keep application-local.properties out of git (it is in .gitignore).
# This file is for local dev only; production uses environment variables.

# Database (required for local run)
spring.datasource.url=jdbc:mysql://localhost:3306/your_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_local_db_password

# JWT - min 64 characters for HS512
jwt.secret=your_local_jwt_secret_at_least_64_characters_long_for_hs512___________

# Stripe - https://dashboard.stripe.com/apikeys (Secret key, sk_test_... or sk_live_...)
stripe.secret-key=sk_test_YOUR_STRIPE_SECRET_KEY_HERE

# Mail (e.g. Gmail) - for password reset and notifications
# MAIL_USERNAME=your@gmail.com
# MAIL_PASSWORD=your_app_password
# MAIL_FROM=your@gmail.com
# Or set in this file:
# spring.mail.username=your@gmail.com
# spring.mail.password=your_app_password
# app.mail.from=your@gmail.com

# Twilio SMS - https://console.twilio.com/
# twilio.account-sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# twilio.auth-token=your_twilio_auth_token_here
# twilio.from-number=+1234567890
