# Copy to application-local.properties and add your keys.
# Keep application-local.properties out of git.

# Stripe - Get from: https://dashboard.stripe.com/apikeys (Secret key, starts with sk_test_)
stripe.secret-key=sk_test_YOUR_STRIPE_SECRET_KEY_HERE

# Twilio SMS - Get from: https://console.twilio.com/
# Use EITHER from-number OR messaging-service-sid (Messaging Service SID starts with MG)
#twilio.account-sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#twilio.auth-token=your_twilio_auth_token_here
#twilio.from-number=+1234567890
# twilio.messaging-service-sid=MGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
