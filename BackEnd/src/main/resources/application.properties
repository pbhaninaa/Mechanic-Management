spring.application.name=TestAppBackEnd

# Frontend URL for reset links and notification links. Override in application-sit.properties for local dev.
app.frontend-url=https://mechanic-management-4m995c2rk-pbhanina-5058s-projects.vercel.app
# Allowed origins when using request Origin (comma-separated). If request Origin is in this list, links use it; else use app.frontend-url. Empty = only default used.
# CORS + link resolution: include every Vercel URL (production + previews). Comma-separated, no spaces.
app.frontend-allowed-origins=https://mechanic-management-4m995c2rk-pbhanina-5058s-projects.vercel.app,https://mechanic-management-806bi8xrb-pbhanina-5058s-projects.vercel.app,http://localhost:5173,https://localhost:5173

# SIT = devs local, UAT = testers deployed, prod = production. Set SPRING_PROFILES_ACTIVE on Railway (uat | prod).
spring.profiles.active=sit

# Stripe: set STRIPE_SECRET_KEY env var, or copy application-local.example.properties to application-local.properties with your sk_test_ key
spring.config.import=optional:classpath:application-local.properties
server.address=0.0.0.0
# Use default port 8080 (no custom port - avoids workplace firewall issues)



# JWT - set JWT_SECRET in production (min 64 chars for HS512). For local dev set in application-local.properties.
jwt.secret=${JWT_SECRET:}
#jwt.expiration=36000 This is for testing purposes only
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# JPA / Hibernate
# After UUID migration: run db/migration-uuid-reset.sql once (see db/README-UUID-MIGRATION.md), then keep as update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.session.jdbc.initialize-schema=always
spring.datasource.platform=mysql
# Database - set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD in production (e.g. Railway env). For local dev set in application-local.properties.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1



# ? Completely disable Spring Session
spring.session.store-type=none

org.gradle.jvmargs=-Xmx2g -Xms512m -XX:MaxMetaspaceSize=512m
org.gradle.daemon=true
#org.gradle.jvmargs=-Xmx4g

